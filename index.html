const VERSION='0.7.0',SAVE_VERSION=7,SAVE_KEY='woodcutter_save';const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),wrap=document.getElementById('canvasWrap');

const CHANGELOG=[{ver:'0.7.0',items:['Epoch system: 3rd prestige layer above Era','Epoch Perks: 8 permanent abilities (Eternal Wisdom, Cosmic Axe, Time Warp, Infinite Growth, Star Forge, Dimensional Rift, Soul Harvest, Void Touch)','Endless Mode via Infinite Growth perk','8 new upgrades: Log Multiplier, Gold Amplifier, Critical Force, Tree Scanner, Double Strike, Fertile Soil, Auto-Seller, Lucky Drops','25 new achievements including Extinction Event, Billionaire, Trillionaire, Cosmic Being, Reality Bender','Enhanced critical hit system with Void Touch (5x damage)','Lucky Drops for bonus resources on tree chops','Soul Harvest for passive amber gain','Support for over 50 total achievements']},{ver:'0.6.0',items:['Ascension perk tree with branching skill paths','Rare golden and ancient tree mutations','Boss trees with massive HP and big rewards','Prestige cosmetics (axe styles, unlockable)','Trade routes between zones for passive income','Market demand system with fluctuating prices','Contracts board with timed long-term goals','PWA support for offline play and mobile install']},{ver:'0.5.0',items:['Animated tree chopping with rotation fall and particles','Floating damage numbers showing actual damage dealt','Enhanced seasonal system: Spring, Summer, Autumn, Winter with visual effects','Weather system: rain, snow, falling leaves with seasonal effects','Building sprites placed on isometric map','Auto-sell lumberjacks (Merchant workers)','Auto-plant lumberjacks (Planter workers)','Worker types with distinct appearances on map','Luxury goods crafting: Furniture + Charcoal → Luxury Goods','Seasonal gameplay: Spring regrow boost, Autumn leaf drops, Winter bonus sales','Enhanced achievements for new content']},{ver:'0.4.0',items:['Massive progression overhaul','Era system: second prestige layer','Amber: prestige currency earned from seasons','Amber Shop: 10 permanent perks','Quest system: 3 rotating missions','Random events','Tree HP scaling with season number']},{ver:'0.3.0',items:['Versioned saves','Export/import base64','Balance pass','Stats tab','Title screen','Mobile touch','Hotkeys']},{ver:'0.2.0',items:['Day/night cycle','Leaf particles','Tech tree','Processing chains','4 biome zones','Named workers','15 achievements','Offline progress']},{ver:'0.1.0',items:['Initial release']}];

function shadeC(c,amt){let r=Math.max(0,parseInt(c.slice(1,3),16)+amt),g=Math.max(0,parseInt(c.slice(3,5),16)+amt),b=Math.max(0,parseInt(c.slice(5,7),16)+amt);return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`}

class Game{
  constructor(){this.logs=0;this.planks=0;this.gold=0;this.charcoal=0;this.furniture=0;this.luxury=0;this.amber=0;this.totalLogs=0;this.season=1;this.seasonBonus=0;this.era=1;this.epoch=1;this.epochPoints=0;this.epochPerks={};for(let ep of EPOCH_PERKS)this.epochPerks[ep.id]=false;this.upgrades={};for(let k in UPGRADES)this.upgrades[k]=0;this.techs={};for(let k in TECH_TREE)this.techs[k]=false;this.amberPerks={};for(let p of AMBER_SHOP)this.amberPerks[p.id]=0;this.achievementsEarned=[];this.stats={treesChopped:0,totalGold:0,heartwoodChopped:0,worldtreeChopped:0,furnitureMade:0,crits:0,totalPlayTime:0,questsCompleted:0,totalAmber:0,eventsTriggered:0,luxuryMade:0,exportsCompleted:0,bossesDefeated:0,goldenChopped:0,ancientChopped:0};this.currentZone=0;this.unlockedZones=[0];this.zones=[];for(let i=0;i<BIOMES.length;i++)this.zones.push(this.genZone(i));this.workers=[];this.particles=[];this.leafParticles=[];this.rainParticles=[];this.snowParticles=[];this.shakeTimer=0;this.hoveredTree=null;this.camX=0;this.camY=0;this.timers={sawmill:0,market:0,autoChop:0,kiln:0,workshop:0,dock:0,merchant:0,planter:0,luxury:0};this.dayTime=.25;this.shopTab='upgrades';this.lastSave=Date.now();this.rateTracker={logs:0,planks:0,gold:0,timer:0,lr:0,pr:0,gr:0};this.running=false;this.weatherSeason=0;this.weatherTimer=0;this.exportOrders=[];this.exportTimer=0;this.quests=[];this.questStats={};this.rollQuests();this.activeEvent=null;this.eventTimer=0;this.nextEventIn=rand(60,180);this.demand={};for(let r of DEMAND_RESOURCES)this.demand[r]=rand(.5,2);this.demandTimer=0;this.contracts=[];this.contractStats={};this.tradeRoutes=[];this.bossTree=null;this.bossTimer=0;this.nextBoss=rand(180,300);this.mutationStats={golden:0,ancient:0,bossesDefeated:0};this.cosmetics={axe:'default',theme:'default'};this.ascensionPerks={};for(let n of ASCENSION_TREE)this.ascensionPerks[n.id]=false;this.rollContracts();this.applyStartPerks()}
  applyStartPerks(){let hs=this.amberPerks.headStart||0;if(hs>0)this.gold+=hs*500;let dp=this.amberPerks.deepPockets||0;if(dp>0)this.upgrades.sawmill=Math.min(dp,UPGRADES.sawmill.max)}
  get curWeather(){return WEATHER_SEASONS[this.weatherSeason]}
  treeHpScale(){return 1+(this.season-1)*0.3+(this.era-1)*0.8}
  get chopPower(){let p=1+this.upgrades.axe+this.seasonBonus+(this.amberPerks.keenEdge||0)*5+this.aB('chop');if(this.techs.goldenAxe)p*=3;if(this.epochPerks.cosmicAxe)p*=10;return Math.floor(p)}
  get critChance(){let c=this.upgrades.enchant*.05+(this.techs.magicSap?.15:0)+(this.amberPerks.luckCharm||0)*.03+this.aB('crit');c+=(this.upgrades.doubleChop||0)*.1;if(this.activeEvent&&this.activeEvent.effect==='critBoost')c=1;return Math.min(c,1)}

  get regrowSpeed(){let s=1+this.upgrades.replant*.2+(this.amberPerks.natureBond||0)*.2;s*=this.curWeather.regrowMul;s+=this.upgrades.planter*.15;s+=(this.upgrades.regrowBoost||0)*.25;if(this.epochPerks.timeWarp)s*=2;return s}
  get maxTreeTier(){let t=Math.min(5,Math.floor(this.upgrades.explore));if(!this.techs.worldTreeSeed&&t>4)t=4;return t}
  get yieldMul(){let m=1+this.seasonBonus*.4;if(this.techs.deepRoots)m*=1.5;if(this.techs.lumberEmpire)m*=2;m*=(1+this.aB('yield'));if(this.activeEvent&&this.activeEvent.effect==='yieldx2')m*=2;m*=this.curWeather.treeMul;m*=(1+(this.upgrades.logMulti||0)*.2);return m}
  get goldMul(){let m=1;if(this.techs.lumberEmpire)m*=2;m*=(1+(this.amberPerks.goldenTouch||0)*.15);m*=(1+this.aB('gold')+this.aB('all'));if(this.activeEvent&&this.activeEvent.effect==='goldx3')m*=3;m*=this.curWeather.goldMul;m*=(1+(this.upgrades.goldMulti||0)*.15);return m}

  get amberPerSeason(){let base=1+this.season*0.5;let goldBonus=Math.floor(Math.log10(Math.max(1,this.stats.totalGold)));base+=goldBonus;base+=(this.amberPerks.amberMagnet||0);base+=this.aB('amber');if(this.techs.eternityForge)base*=2;if(this.epochPerks&&this.epochPerks.starForge)base*=5;base*=1+this.season*0.1;return Math.floor(base)}
  aB(type){let t=0;for(let id of this.achievementsEarned){let a=ACHIEVEMENTS.find(d=>d.id===id);if(!a)continue;let b=a.bonus,parts=b.split('+'),k=parts[0],v=parseFloat(parts[1]);if(k===type)t+=b.includes('%')?v/100:v}return t}
  genZone(bi){let biome=BIOMES[bi],trees=[];for(let gx=0;gx<GRID;gx++)for(let gy=0;gy<GRID;gy++){if(Math.random()<.6){let tier=this.pickTier(biome.tw);let T=TREE_TYPES[tier],hpMul=this.treeHpScale();trees.push({gx,gy,tier,hp:Math.ceil(T.hp*hpMul),maxHp:Math.ceil(T.hp*hpMul),alive:true,rt:0,sc:rand(.8,1.15),sw:rand(0,6.28),wb:0,fa:0,falling:false,fd:1,mutation:null})}}return{bi,trees}}

  chopTree(tree,worker=false,damage=null){if(!tree||!tree.alive)return;let pw=damage||this.chopPower,crit=!damage&&Math.random()<this.critChance;if(crit){pw*=this.critMultiplier;this.stats.crits++;this.qInc('critsLanded',1)}tree.hp-=pw;tree.wb=.3;let p=isoToScreen(tree.gx+.5,tree.gy+.5);let dmgColor=crit?'#ffd700':'#ffccaa';this.floatText(p.x,p.y-40,`${pw}`,dmgColor);for(let i=0;i<4;i++)this.particles.push({x:p.x+rand(-8,8),y:p.y-20+rand(-10,10),vx:rand(-2,2),vy:rand(-3,-.5),life:1,c:crit?'#ffd700':'#8B6914',s:rand(2,5)});if(tree.hp<=0){tree.alive=false;tree.falling=true;tree.fa=0;tree.fd=Math.random()<.5?1:-1;let T=TREE_TYPES[tree.tier];let logs=Math.ceil(T.y*this.yieldMul*(crit?2:1));let bonus=0;if(Math.random()<.02+(this.upgrades.luckyDrop||0)*.02){bonus=Math.ceil(T.y*this.yieldMul*.5);logs+=bonus}if(this.epochPerks.soulHarvest&&Math.random()<.1){this.amber+=1;this.stats.totalAmber+=1}this.logs+=logs;this.totalLogs+=logs;this.rateTracker.logs+=logs;this.stats.treesChopped++;if(tree.tier===4){this.stats.heartwoodChopped++;this.qInc('heartwoodChop',1)}if(tree.tier===5){this.stats.worldtreeChopped++}if(tree.mutation==='golden'){this.stats.goldenChopped++}if(tree.mutation==='ancient'){this.stats.ancientChopped++}if(tree.tier===0)this.qInc('pineChopped',1);if(tree.tier===1)this.qInc('oakChopped',1);if(tree.tier===3)this.qInc('ironChopped',1);this.qInc('anyChopped',1);this.floatText(p.x,p.y-60,`+${fmt(logs)} 🪵`,crit?'#ffd700':'#90EE90');tree.rt=T.rg;for(let i=0;i<12;i++)this.particles.push({x:p.x+rand(-20,20),y:p.y-25+rand(-15,10),vx:rand(-4,4),vy:rand(-5,-1),life:1,c:'#2d5a1e',s:rand(2,8)});if(this.weatherSeason===2){for(let i=0;i<6;i++)this.leafParticles.push({x:p.x+rand(-10,10),y:p.y-30,vx:rand(-1,1),vy:rand(.3,.8),r:rand(0,6.28),rs:rand(-2,2),life:1,s:rand(4,8),c:pick(['#aa5a1a','#cc7a2a','#8a5a2a'])})}if((this.upgrades.doubleChop||0)>0&&!damage&&Math.random()<(this.upgrades.doubleChop||0)*.1){this.chopTree(tree,worker,this.chopPower)}if(!worker)this.shakeTimer=.12}}
  floatText(x,y,text,color){let el=document.createElement('div');el.className='float-text';el.style.left=(x+this.camX+wrap.clientWidth/2)+'px';el.style.top=(y+this.camY+wrap.clientHeight/2-60)+'px';el.style.color=color;el.textContent=text;wrap.appendChild(el);setTimeout(()=>el.remove(),900)}

  workerCost(){return Math.floor(100*Math.pow(1.4,this.workers.length))}
  hireWorker(){let c=this.workerCost();if(this.gold<c)return;this.gold-=c;let nm=pick(W_NAMES)+' '+pick(W_TITLES);let type=Math.random()<.6?'chopper':(Math.random()<.5?'merchant':'planter');let gx=Math.floor(rand(0,GRID)),gy=Math.floor(rand(0,GRID)),pos=isoToScreen(gx+.5,gy+.5);this.workers.push({name:nm,type,speed:rand(.6,1.4),power:rand(.5,1.5),carry:rand(.8,1.2),gx,gy,target:null,mt:0,ct:0,px:pos.x,py:pos.y});this.buildShop()}
  updateWorkers(dt){for(let w of this.workers){let sm=w.speed*this.workerMul;if(!w.target||!w.target.alive){if(w.type==='merchant'){continue}let al=this.cTrees.filter(t=>t.alive);if(al.length){let best=null,bd=1e9;for(let t of al){let d=(t.gx-w.gx)**2+(t.gy-w.gy)**2+rand(0,6);if(d<bd){bd=d;best=t}}w.target=best}continue}let t=w.target,dx=t.gx-w.gx,dy=t.gy-w.gy,dist=Math.abs(dx)+Math.abs(dy);if(dist>1.1){w.mt+=dt*sm*2;if(w.mt>=.4){w.mt=0;if(Math.abs(dx)>Math.abs(dy))w.gx+=Math.sign(dx);else w.gy+=Math.sign(dy)}let tp=isoToScreen(w.gx+.5,w.gy+.5);w.px=lerp(w.px,tp.x,dt*6);w.py=lerp(w.py,tp.y,dt*6)}else{w.ct+=dt*sm;if(w.ct>=1/w.power){w.ct=0;this.chopTree(t,true)}let tp=isoToScreen(w.gx+.5,w.gy+.5);w.px=lerp(w.px,tp.x,dt*8);w.py=lerp(w.py,tp.y,dt*8)}}}
  uCost(k){return softCost(UPGRADES[k].base,UPGRADES[k].mul,this.upgrades[k])}

  canResearch(k){let t=TECH_TREE[k];if(this.techs[k])return false;for(let r of t.req)if(!this.techs[r])return false;let c=t.cost*(1-(this.amberPerks.quickStudy||0)*.1);return this.gold>=c}

  buildZoneTabs(){let h='';for(let i=0;i<BIOMES.length;i++){let b=BIOMES[i],u=this.unlockedZones.includes(i),a=this.currentZone===i;h+=u?`<div class="zone-tab ${a?'active':''}" onclick="game.switchZone(${i})">${b.emoji} ${b.name}</div>`:`<div class="zone-tab locked" onclick="game.unlockZone(${i})" title="${fmt(b.cost)}g">${b.emoji} 🔒 ${fmt(b.cost)}g</div>`}document.getElementById('zoneTabs').innerHTML=h}
  sellLogs(){if(this.logs>0){let g=Math.floor(this.logs*this.goldMul*this.demand.logs);this.gold+=g;this.stats.totalGold+=g;this.rateTracker.gold+=g;this.qInc('goldEarned',g);this.qInc('logsSold',Math.floor(this.logs));this.notify(`Sold ${fmt(this.logs)} logs → ${fmt(g)} 🪙`);this.logs=0}}

  canPrestige(){return this.totalLogs>=Math.floor(1000*Math.pow(2.5,this.season-1))}
  prestige(){if(!this.canPrestige())return;let amberGain=this.amberPerSeason;this.amber+=amberGain;this.stats.totalAmber+=amberGain;this.season++;this.seasonBonus+=1;this.logs=0;this.planks=0;this.gold=0;this.charcoal=0;this.furniture=0;this.luxury=0;this.totalLogs=0;for(let k in this.upgrades)this.upgrades[k]=0;let keepW=Math.floor(this.workers.length*.2)+(this.amberPerks.bornLeader||0);this.workers=this.workers.slice(0,keepW);let keepZ=this.amberPerks.zoneMemory||0;let keptZones=[0];for(let i=1;i<Math.min(1+keepZ,this.unlockedZones.length);i++)keptZones.push(this.unlockedZones[i]);this.unlockedZones=keptZones;this.currentZone=0;for(let i=0;i<BIOMES.length;i++)this.zones[i]=this.genZone(i);this.applyStartPerks();this.rollQuests();this.buildShop();this.buildZoneTabs();this.notify(`🍂 Season ${this.season}! +${amberGain} 🔶 Amber`)}

  doEpoch(){if(!this.canEpoch())return;let pts=this.era;this.epochPoints+=pts;this.epoch++;this.era=1;this.season=1;this.seasonBonus=0;this.amber=0;for(let k in this.ascensionPerks)this.ascensionPerks[k]=false;this.logs=0;this.planks=0;this.gold=0;this.charcoal=0;this.furniture=0;this.luxury=0;this.totalLogs=0;for(let k in this.upgrades)this.upgrades[k]=0;for(let k in this.techs)this.techs[k]=false;this.workers=[];this.unlockedZones=[0];this.currentZone=0;for(let i=0;i<BIOMES.length;i++)this.zones[i]=this.genZone(i);if(this.epochPerks.dimensionalRift)this.unlockedZones=[0,1,2,3,4];this.applyStartPerks();this.rollQuests();this.buildShop();this.buildZoneTabs();this.notify(`🌌 EPOCH ${this.epoch}! +${pts} Epoch Points`)}

  rollContracts(){this.contractStats={};let pool=[...CONTRACTS_POOL].sort(()=>Math.random()-.5);this.contracts=pool.slice(0,2).map(c=>({...c,progress:0,timeRemaining:c.timeLimit}))}
  cInc(stat,amt){if(this.contractStats[stat]===undefined)this.contractStats[stat]=0;this.contractStats[stat]+=amt;for(let c of this.contracts){if(c.stat===stat){c.progress=this.contractStats[stat];if(c.progress>=c.target){this.completeContract(c)}}}}
  completeContract(c){let idx=this.contracts.indexOf(c);if(idx===-1)return;if(c.reward.type==='gold'){this.gold+=c.reward.amount;this.stats.totalGold+=c.reward.amount;this.notify(`📋 Contract done! +${fmt(c.reward.amount)} 🪙`)}else if(c.reward.type==='amber'){this.amber+=c.reward.amount;this.stats.totalAmber+=c.reward.amount;this.notify(`📋 Contract done! +${c.reward.amount} 🔶`)}let avail=CONTRACTS_POOL.filter(x=>!this.contracts.find(cc=>cc.id===x.id));if(avail.length>0){let nc=pick(avail);this.contracts[idx]={...nc,progress:0,timeRemaining:nc.timeLimit};if(this.contractStats[nc.stat]===undefined)this.contractStats[nc.stat]=0;this.contracts[idx].progress=this.contractStats[nc.stat]}}
  canBuyAscension(id){let n=ASCENSION_TREE.find(x=>x.id===id);if(!n||this.ascensionPerks[id])return false;if(this.amber<n.cost)return false;for(let req of n.req)if(!this.ascensionPerks[req])return false;return true}

  buyEpochPerk(id){let ep=EPOCH_PERKS.find(x=>x.id===id);if(!ep||this.epochPerks[id]||this.epochPoints<ep.cost)return;this.epochPoints-=ep.cost;this.epochPerks[id]=true;this.notify(`✨ ${ep.name}!`);this.buildShop()}

  handleHover(mx,my){let wx=mx-wrap.clientWidth/2-this.camX,wy=my-wrap.clientHeight/2-this.camY+60;let best=null,bd=30;for(let t of this.cTrees){if(!t.alive)continue;let{x,y}=isoToScreen(t.gx+.5,t.gy+.5);let d=Math.sqrt((wx-x)**2+(wy-y+20)**2);if(d<bd){bd=d;best=t}}this.hoveredTree=best;let tip=document.getElementById('tooltip');if(best){let T=TREE_TYPES[best.tier];tip.innerHTML=`<b>${T.name}</b> T${best.tier+1}<br>HP: ${fmt(best.hp)}/${fmt(best.maxHp)}<br>Yield: ~${fmt(Math.ceil(T.y*this.yieldMul))}<br>Power: ${fmt(this.chopPower)}`;tip.style.display='block';tip.style.left=(mx+14)+'px';tip.style.top=(my-10)+'px'}else tip.style.display='none'}
  setShopTab(tab){this.shopTab=tab;document.querySelectorAll('.shop-tab').forEach(el=>{el.classList.toggle('active',el.dataset.tab===tab)});this.buildShop()}
  buildShopTabs(){let tabs=['upgrades','workers','tech','amber','epoch','contracts','trade','cosmetics','quests','achieve','stats','save'],labels=['Upgrades','Workers','Tech','Amber','Epoch','Contracts','Trade','Cosmetics','Quests','Trophies','Stats','Save'];let h='';for(let i=0;i<tabs.length;i++)h+=`<div class="shop-tab ${this.shopTab===tabs[i]?'active':''}" data-tab="${tabs[i]}" onclick="game.setShopTab('${tabs[i]}')">${labels[i]}</div>`;document.getElementById('shopTabs').innerHTML=h}
  buildShop(){this.buildShopTabs();let h='';if(this.shopTab==='upgrades'){let secs={};for(let k in UPGRADES){let u=UPGRADES[k];if(!secs[u.sec])secs[u.sec]=[];secs[u.sec].push(k)}const lb={tools:'⚒️ Tools',buildings:'🏗️ Buildings',magic:'✨ Magic',exploration:'🗺️ Exploration'};for(let s in secs){h+=`<div class="shop-section">${lb[s]||s}</div>`;for(let k of secs[s]){let u=UPGRADES[k],lv=this.upgrades[k],c=this.uCost(k),mx=lv>=u.max;h+=`<div class="upgrade-btn ${this.canBuy(k)?'':'locked'}" data-key="${k}" onclick="game.buyUpgrade('${k}')"><div class="icon">${u.icon}</div><div class="info"><div class="name">${u.name}</div><div class="desc">${u.desc}</div></div><div><div class="cost">${mx?'MAX':'🪙 '+fmt(c)}</div><div class="level">Lv ${lv}${mx?'':'/'+u.max}</div></div></div>`}}h+=`<div class="shop-section">💰 Sell (S D F G H)</div>`;h+=this.sellBtn('🪵','Sell Logs','1→1g','sellLogs');h+=this.sellBtn('🪓','Sell Planks','1→4g','sellPlanks');if(this.techs.charcoalKiln)h+=this.sellBtn('🔥','Sell Charcoal','1→7g','sellCharcoal');if(this.techs.furnWorkshop)h+=this.sellBtn('🪑','Sell Furniture','1→25g','sellFurniture');if(this.techs.artisanGuild)h+=this.sellBtn('✨','Sell Luxury','1→100g','sellLuxury')}else if(this.shopTab==='workers'){let c=this.workerCost();h+=`<div class="upgrade-btn ${this.gold>=c?'':'locked'}" onclick="game.hireWorker()"><div class="icon">👷</div><div class="info"><div class="name">Hire Worker</div><div class="desc">Auto-chops, merchants, planters</div></div><div><div class="cost">🪙 ${fmt(c)}</div><div class="level">${this.workers.length} hired</div></div></div>`;h+=`<div class="shop-section">👥 Crew (${this.workers.length})</div>`;for(let w of this.workers){let wt=WORKER_TYPES.find(x=>x.type===w.type);h+=`<div class="worker-card"><div class="icon">${wt.icon}</div><div style="flex:1"><div class="wname">${w.name}</div><div class="wstat">${wt.name} ⚡${w.speed.toFixed(1)} 💪${w.power.toFixed(1)}</div></div></div>`}}else if(this.shopTab==='tech'){h+=`<div class="shop-section">🔬 Research</div>`;for(let k in TECH_TREE){let t=TECH_TREE[k],done=this.techs[k],can=this.canResearch(k),reqMet=t.req.every(r=>this.techs[r]),vis=reqMet||done||t.req.length===0;if(!vis)h+=`<div class="upgrade-btn locked"><div class="icon">❓</div><div class="info"><div class="name">???</div><div class="desc">Req: ${t.req.map(r=>TECH_TREE[r].name).join(', ')}</div></div><div><div class="cost">🔒</div></div></div>`;else{let c=this.techCost(k);h+=`<div class="upgrade-btn ${done?'':(can?'':'locked')}" onclick="${done?'':`game.research('${k}')`}"><div class="icon">${t.icon}</div><div class="info"><div class="name">${t.name}</div><div class="desc">${t.desc}</div></div><div><div class="cost">${done?'✅':'🪙 '+fmt(c)}</div></div></div>`}}}else if(this.shopTab==='amber'){h+=`<div class="shop-section">🔶 Amber: ${this.amber}</div>`;h+=`<div style="padding:4px 14px;font-size:10px;color:#6a7a9a">Era ${this.era} | Next season: +${this.amberPerSeason}${this.canEra()?' | ERA RESET AVAILABLE!':''}</div>`;if(this.canEra())h+=`<div class="upgrade-btn" style="border-color:rgba(255,200,50,.3);background:rgba(255,200,50,.08)" onclick="if(confirm('Start a new Era? This resets seasons, techs, and all progress except amber and amber perks.'))game.doEra()"><div class="icon">⭐</div><div class="info"><div class="name">Ascend to Era ${this.era+1}</div><div class="desc">Reset everything. Amber perks persist.</div></div><div><div class="cost" style="color:#ffd700">Ascend</div></div></div>`;h+=`<div class="shop-section">⬆️ Ascension Tree</div>`;let byBranch={speed:[],yield:[],automation:[]};for(let n of ASCENSION_TREE){byBranch[n.branch].push(n)}const branchIcons={speed:'⚡',yield:'📈',automation:'🤖'};for(let branch in byBranch){h+=`<div class="shop-section" style="padding:6px 12px 2px">${branchIcons[branch]} ${branch}</div>`;for(let n of byBranch[branch]){let unlocked=this.ascensionPerks[n.id],can=this.canBuyAscension(n.id);h+=`<div class="upgrade-btn ${can?'':'locked'}" ${can?`onclick="game.buyAscension('${n.id}')"`:''} style="${unlocked?'opacity:.5;':''} "><div class="icon">${n.icon}</div><div class="info"><div class="name">${n.name}</div><div class="desc">${n.desc}</div></div><div><div class="cost amber">${unlocked?'✅':'🔶 '+n.cost}</div></div></div>`}}}else if(this.shopTab==='epoch'){h+=`<div class="shop-section">🌌 Epoch: ${this.epoch}</div>`;h+=`<div style="padding:4px 14px;font-size:10px;color:#6a7a9a">Era ${this.era} | Points: ${this.epochPoints}${this.canEpoch()?' | READY TO TRANSCEND!':''}</div>`;if(this.canEpoch()){h+=`<div class="upgrade-btn" style="border-color:rgba(150,100,200,.4);background:rgba(150,100,200,.08)" onclick="if(confirm('Start a new Epoch? This resets everything except Epoch Perks and Epoch Points.'))game.doEpoch()"><div class="icon">🌌</div><div class="info"><div class="name">Transcend to Epoch ${this.epoch+1}</div><div class="desc">Ultimate reset. Epoch Perks persist.</div></div><div><div class="cost" style="color:#b8a8ff">Transcend</div></div></div>`}h+=`<div class="shop-section">✨ Epoch Perks</div>`;for(let ep of EPOCH_PERKS){let unlocked=this.epochPerks[ep.id];let canBuy=this.epochPoints>=ep.cost&&!unlocked;h+=`<div class="upgrade-btn ${canBuy?'':'locked'}" ${canBuy?`onclick="game.buyEpochPerk('${ep.id}')"`:''} style="${unlocked?'opacity:.5;':''} "><div class="icon">${ep.icon}</div><div class="info"><div class="name">${ep.name}</div><div class="desc">${ep.desc}</div></div><div><div class="cost amber">${unlocked?'✅':'🌌 '+ep.cost}</div></div></div>`}}else if(this.shopTab==='contracts'){h+=`<div class="shop-section">📋 Contracts (${this.contracts.length} active)</div>`;for(let c of this.contracts){let pct=Math.min(100,Math.floor(c.progress/c.target*100));let done=c.progress>=c.target;h+=`<div class="quest-card"><div class="qname">${done?'✅':''} ${c.name}</div><div class="qdesc">${c.desc}</div><div class="qprog"><div class="qfill" style="width:${pct}%"></div></div><div class="qreward">Time: ${Math.ceil(c.timeRemaining)}s | Reward: ${c.reward.type==='gold'?'🪙 '+fmt(c.reward.amount):'🔶 '+c.reward.amount}</div></div>`}}else if(this.shopTab==='trade'){h+='<div class="shop-section">🛣️ Trade Routes</div>';h+='<div style="padding:8px 14px;font-size:11px;color:#8a9ab0">Connected routes produce 100🪙/sec each</div>';for(let i=0;i<BIOMES.length;i++){let b=BIOMES[i];let cost=50000;let conn=this.tradeRoutes.some(r=>(r[0]===0&&r[1]===i)||(r[0]===i&&r[1]===0));let cls=conn?'':this.gold>=cost?'':'locked';let sty=conn?'opacity:.6':'';let oc=(!conn&&this.gold>=cost)?'onclick="game.connectZones(0,'+i+')"':'';h+='<div class="upgrade-btn '+cls+'" '+oc+' style="'+sty+'"><div class="icon">'+b.emoji+'</div><div class="info"><div class="name">'+b.name+'</div><div class="desc">'+(conn?'Connected':'Not connected')+'</div></div><div><div class="cost">'+(conn?'✅':'🪙 '+fmt(cost))+'</div></div></div>'}h+='<div class="shop-section">💰 Trade Income</div>';h+='<div style="padding:4px 14px;font-size:10px;color:#6a7a9a">+'+this.getTradeIncome()+'/sec from '+this.tradeRoutes.length+' routes</div>';h+='<div class="shop-section">📊 Market Demand</div>';for(let r of DEMAND_RESOURCES){let dm=this.demand[r]||1;let col=dm>1?'#6de06d':'#e05050';let txt=dm>1?'High '+dm.toFixed(1)+'x':'Low '+dm.toFixed(1)+'x';h+='<div style="padding:6px 14px;display:flex;justify-content:space-between;font-size:10px"><span>'+r+'</span><span style="color:'+col+'">'+txt+'</span></div>'}}else if(this.shopTab==='cosmetics'){h+=`<div class="shop-section">🪓 Axe Cosmetics</div>`;h+=`<div style="padding:4px 14px;font-size:10px;color:#6a7a9a">Unlock cosmetics as you progress eras</div>`;for(let ax of AXE_COSMETICS){let unlocked=this.era>=ax.era;h+=`<div class="upgrade-btn ${unlocked?'':'locked'}"><div class="icon">🪓</div><div class="info"><div class="name">${ax.name}</div><div class="desc">${unlocked?'Unlocked':'Unlock at Era '+ax.era}</div></div><div><div class="cost" style="font-size:9px;color:${unlocked?'#90EE90':'#6a7a9a'}">${unlocked?'✅':'Era '+ax.era}</div></div></div>`}}else if(this.shopTab==='quests'){h+=`<div class="shop-section">📜 Active Quests (${this.stats.questsCompleted} completed)</div>`;for(let q of this.quests){let pct=Math.min(100,Math.floor(q.progress/q.target*100));let done=q.progress>=q.target;h+=`<div class="quest-card"><div class="qname">${done?'✅':''} ${q.name}</div><div class="qdesc">${q.desc}</div><div class="qprog"><div class="qfill" style="width:${pct}%"></div></div><div class="qreward">Reward: ${q.reward.type==='gold'?'🪙 '+fmt(q.reward.amount):'🔶 '+q.reward.amount}</div></div>`}}else if(this.shopTab==='achieve'){h+=`<div class="shop-section">🏆 Achievements (${this.achievementsEarned.length}/${ACHIEVEMENTS.length})</div>`;for(let a of ACHIEVEMENTS){let e=this.achievementsEarned.includes(a.id);h+=`<div class="upgrade-btn ${e?'':'locked'}"><div class="icon">${e?a.icon:'🔒'}</div><div class="info"><div class="name">${e?a.name:'???'}</div><div class="desc">${a.desc}</div></div><div><div class="cost" style="color:${e?'#90EE90':'#6a7a9a'};font-size:9px">${e?a.bonus:'—'}</div></div></div>`}}else if(this.shopTab==='stats'){h+=`<div class="shop-section">📊 Stats</div>`;const sr=(l,v)=>`<div class="stat-row"><span class="slabel">${l}</span><span class="sval">${v}</span></div>`;h+=sr('Play Time',fmtTime(this.stats.totalPlayTime));h+=sr('Era',this.era);h+=sr('Season',this.season);h+=sr('Weather',this.curWeather.name);h+=sr('Trees Chopped',fmt(this.stats.treesChopped));h+=sr('Gold Earned',fmt(this.stats.totalGold));h+=sr('Amber Earned',fmt(this.stats.totalAmber));h+=sr('Furniture',fmt(this.stats.furnitureMade));h+=sr('Luxury Made',fmt(this.stats.luxuryMade));h+=sr('Crits',fmt(this.stats.crits));h+=sr('Quests',this.stats.questsCompleted);h+=sr('Events',this.stats.eventsTriggered);h+=sr('Workers',this.workers.length);h+=sr('Techs',Object.values(this.techs).filter(v=>v).length+'/'+Object.keys(TECH_TREE).length);h+=sr('Achievements',this.achievementsEarned.length+'/'+ACHIEVEMENTS.length);h+=`<div class="shop-section">⚡ Rates</div>`;h+=sr('Logs/s',this.rateTracker.lr.toFixed(2));h+=sr('Planks/s',this.rateTracker.pr.toFixed(2));h+=sr('Gold/s',this.rateTracker.gr.toFixed(2))}else if(this.shopTab==='save'){h+=`<div class="shop-section">💾 Save & Load</div>`;let saveData=JSON.stringify(this.getSaveData());let b64=btoa(saveData);h+=`<div class="save-area"><textarea readonly onclick="this.select()">${b64}</textarea><div class="save-btns"><button onclick="game.copySave()">Copy</button><button onclick="game.downloadSave()">Download</button></div></div>`;h+=`<div class="shop-section">📥 Import</div>`;h+=`<div class="save-area"><textarea id="importArea" placeholder="Paste save code..."></textarea><div class="save-btns"><button onclick="game.importSave()">Import</button><button class="danger" onclick="game.newGame()">New Game</button></div></div>`}document.getElementById('shopContent').innerHTML=h}
  sellBtn(icon,name,ratio,method){return`<div class="upgrade-btn" onclick="game.${method}()"><div class="icon">${icon}</div><div class="info"><div class="name">${name}</div><div class="desc">${ratio}</div></div><div><div class="cost">Sell</div></div></div>`}
  refreshShopStates(){if(this.shopTab!=='upgrades')return;document.querySelectorAll('.upgrade-btn[data-key]').forEach(btn=>{let k=btn.dataset.key;btn.classList.toggle('locked',!this.canBuy(k))})}
  getSaveData(){return{saveVersion:SAVE_VERSION,logs:this.logs,planks:this.planks,gold:this.gold,charcoal:this.charcoal,furniture:this.furniture,luxury:this.luxury,amber:this.amber,totalLogs:this.totalLogs,season:this.season,seasonBonus:this.seasonBonus,era:this.era,epoch:this.epoch,epochPoints:this.epochPoints,epochPerks:this.epochPerks,upgrades:this.upgrades,techs:this.techs,amberPerks:this.amberPerks,achievementsEarned:this.achievementsEarned,stats:this.stats,currentZone:this.currentZone,unlockedZones:this.unlockedZones,zones:this.zones,workers:this.workers,quests:this.quests.map(q=>({...q})),questStats:this.questStats,weatherSeason:this.weatherSeason,weatherTimer:this.weatherTimer,demand:this.demand,contracts:this.contracts,contractStats:this.contractStats,tradeRoutes:this.tradeRoutes,bossTimer:this.bossTimer,nextBoss:this.nextBoss,mutationStats:this.mutationStats,cosmetics:this.cosmetics,ascensionPerks:this.ascensionPerks}}
  loadSaveData(d){d=migrateSave(d);this.logs=d.logs||0;this.planks=d.planks||0;this.gold=d.gold||0;this.charcoal=d.charcoal||0;this.furniture=d.furniture||0;this.luxury=d.luxury||0;this.amber=d.amber||0;this.totalLogs=d.totalLogs||0;this.season=d.season||1;this.seasonBonus=d.seasonBonus||0;this.era=d.era||1;this.epoch=d.epoch||1;this.epochPoints=d.epochPoints||0;this.epochPerks=d.epochPerks||{};for(let ep of EPOCH_PERKS)if(!this.epochPerks[ep.id])this.epochPerks[ep.id]=false;this.upgrades=d.upgrades||{};this.techs=d.techs||{};this.amberPerks=d.amberPerks||{};this.achievementsEarned=d.achievementsEarned||[];this.stats=d.stats||{};this.currentZone=d.currentZone||0;this.unlockedZones=d.unlockedZones||[0];this.zones=d.zones||[];for(let i=0;i<BIOMES.length;i++)if(!this.zones[i])this.zones[i]=this.genZone(i);this.workers=d.workers||[];this.quests=d.quests||[];if(this.quests.length===0)this.rollQuests();this.questStats=d.questStats||{};this.weatherSeason=d.weatherSeason||0;this.weatherTimer=d.weatherTimer||0;this.demand=d.demand||{};for(let r of DEMAND_RESOURCES)if(!this.demand[r])this.demand[r]=rand(.5,2);this.contracts=d.contracts||[];if(this.contracts.length===0)this.rollContracts();this.contractStats=d.contractStats||{};this.tradeRoutes=d.tradeRoutes||[];this.bossTimer=d.bossTimer||0;this.nextBoss=d.nextBoss||rand(180,300);this.mutationStats=d.mutationStats||{golden:0,ancient:0,bossesDefeated:0};this.cosmetics=d.cosmetics||{axe:'default',theme:'default'};this.ascensionPerks=d.ascensionPerks||{};for(let n of ASCENSION_TREE)if(!this.ascensionPerks[n.id])this.ascensionPerks[n.id]=false;this.buildZoneTabs();this.buildShop()}
  save(){try{localStorage.setItem(SAVE_KEY,btoa(JSON.stringify(this.getSaveData())))}catch(e){}}
  load(){try{let data=JSON.parse(atob(localStorage.getItem(SAVE_KEY)));if(data){this.loadSaveData(data);return true}}catch(e){}return false}
  copySave(){let t=document.querySelector('.save-area textarea');t.select();document.execCommand('copy');this.notify('Copied to clipboard!')}
  downloadSave(){let d=new Date().toISOString().slice(0,10);let s=JSON.stringify(this.getSaveData());let blob=new Blob([s],{type:'application/json'});let url=URL.createObjectURL(blob);let a=document.createElement('a');a.href=url;a.download=`woodcutter-${d}.json`;a.click();URL.revokeObjectURL(url)}
  importSave(){let area=document.getElementById('importArea');if(!area.value.trim())return this.notify('Paste a save code first');try{let data=JSON.parse(atob(area.value));this.loadSaveData(data);this.notify('Save imported!');area.value=''}catch(e){this.notify('Invalid save code')}}
  newGame(){if(confirm('Start a new game? Current progress will be lost.'))localStorage.removeItem(SAVE_KEY),location.reload()}
  dismissWelcome(){document.getElementById('welcomeBack').style.display='none'}
}
let game=null;
function resize(){canvas.width=wrap.clientWidth;canvas.height=wrap.clientHeight}
resize();window.addEventListener('resize',resize);
canvas.addEventListener('click',e=>{if(!game||!game.running)return;let r=canvas.getBoundingClientRect();game.handleClick(e.clientX-r.left,e.clientY-r.top)});
canvas.addEventListener('mousemove',e=>{if(!game||!game.running)return;let r=canvas.getBoundingClientRect();game.handleHover(e.clientX-r.left,e.clientY-r.top)});
let dragging=false,dragX,dragY;
canvas.addEventListener('mousedown',e=>{if(e.button===2||e.button===1){dragging=true;dragX=e.clientX;dragY=e.clientY;e.preventDefault()}});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
window.addEventListener('mousemove',e=>{if(dragging&&game){game.camX+=e.clientX-dragX;game.camY+=e.clientY-dragY;dragX=e.clientX;dragY=e.clientY}});
window.addEventListener('mouseup',()=>dragging=false);
let touches={};
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(!game||!game.running)return;for(let t of e.changedTouches)touches[t.identifier]={x:t.clientX,y:t.clientY,moved:false,st:Date.now()}},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!game||!game.running)return;if(e.touches.length===1){let t=e.touches[0],p=touches[t.identifier];if(p){let dx=t.clientX-p.x,dy=t.clientY-p.y;if(Math.abs(dx)+Math.abs(dy)>4)p.moved=true;game.camX+=dx;game.camY+=dy;p.x=t.clientX;p.y=t.clientY}}else{for(let t of e.changedTouches){let p=touches[t.identifier];if(p){p.moved=true;p.x=t.clientX;p.y=t.clientY}}}},{passive:false});
canvas.addEventListener('touchend',e=>{for(let t of e.changedTouches){let p=touches[t.identifier];if(p&&!p.moved&&Date.now()-p.st<300){let r=canvas.getBoundingClientRect();game.handleClick(t.clientX-r.left,t.clientY-r.top)}delete touches[t.identifier]}});
document.addEventListener('keydown',e=>{if(!game||!game.running||e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;switch(e.key.toLowerCase()){case's':game.sellLogs();break;case'd':game.sellPlanks();break;case'f':game.sellCharcoal();break;case'g':game.sellFurniture();break;case'h':game.sellLuxury();break}});
window.addEventListener('beforeunload',()=>{if(game&&game.running)game.save()});
function start(){document.getElementById('titleScreen').classList.add('hidden');game=new Game();game.camX=0;game.camY=-GRID*TILE_H/2+40;if(!game.load()){game.buildShop();game.buildZoneTabs()}game.running=true;document.getElementById('verBadge').textContent='v'+VERSION;document.getElementById('titleVer').textContent='v'+VERSION;frame()}
function frame(){if(!game)return;let now=performance.now();let dt=Math.min((now-(game.lastTime||now))/1000,.1);game.lastTime=now;if(game.running){game.update(dt);game.draw(now/1000)}requestAnimationFrame(frame)}
document.getElementById('btnPlay').addEventListener('click',start);
document.getElementById('btnContinue').addEventListener('click',start);
document.getElementById('btnImport').addEventListener('click',()=>{let code=prompt('Paste your save code:');if(code){try{let d=JSON.parse(atob(code));game=new Game();game.loadSaveData(d);start()}catch(e){alert('Invalid save code')}}});
if(localStorage.getItem(SAVE_KEY))document.getElementById('btnContinue').style.display='inline-block';
if('serviceWorker' in navigator){navigator.serviceWorker.register(URL.createObjectURL(new Blob([`self.addEventListener('install',e=>e.waitUntil(caches.open('wc-v6').then(c=>c.addAll(['/']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))))`],{type:'application/javascript'})))}
</script>
